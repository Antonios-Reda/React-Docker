name: Build and test
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t antoniosreda/react-test -f Dockerfile.dev .
      - run: docker run -e CI=true antoniosreda/react-test npm run test

      - name: create deployment package
        run: zip -r deploy.zip . -x '*.git*'

      - name: Deploy over elastic beanstalks 
        uses: einaregilsson/beanstalk-deploy@v22
        with:
         aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
         aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         application_name: react
         environment_name: React-env
         version_label: ${{github.sha}}
         region: us-east-1
         deployment_package: deploy.zip